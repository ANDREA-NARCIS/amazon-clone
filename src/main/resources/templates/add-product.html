<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
        }

        .navbar {
            background: #131921;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #f0c14b;
            box-shadow: 0 0 5px rgba(240,193,75,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ffd814;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #f7ca00;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007185;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="navbar">
    Add New Product
</div>

<div class="container">
    <div class="card">
        <h2>Add Product</h2>

        <form th:action="@{/product/add}" th:object="${product}" method="post">

            <label>Product Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter product name" required />

            <label>Description</label>
            <textarea th:field="*{description}" placeholder="Enter product description"></textarea>

            <label>Price (₹)</label>
            <input type="number" step="0.01" th:field="*{price}" placeholder="Enter price" required />

            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}" placeholder="Enter image URL" />

            <button type="submit">Add Product</button>

        </form>

        <a href="/" class="back">← Back to Home</a>
    </div>
</div>

</body>
</html>
