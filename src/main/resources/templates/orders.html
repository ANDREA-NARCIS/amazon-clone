<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>

    <style>
        body { font-family: Arial; background:#f3f3f3; margin:0; }

        .navbar {
            background:#131921;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container {
            padding:20px;
        }

        .order {
            background:white;
            padding:15px;
            margin-bottom:20px;
            border-radius:10px;
        }

        .product {
            border-bottom:1px solid #ddd;
            padding:10px 0;
        }

        .product:last-child {
            border-bottom:none;
        }
    </style>
</head>

<body>

<div class="navbar">My Orders</div>

<div class="container">

    <div th:if="${#lists.isEmpty(orders)}">
        <p>No orders yet.</p>
    </div>

    <div th:each="order : ${orders}" class="order">
        <h3>Order ID: <span th:text="${order.id}"></span></h3>

        <div th:each="p : ${order.products}" class="product">
            <p><b th:text="${p.name}"></b></p>
            <p>₹<span th:text="${p.price}"></span></p>
        </div>
    </div>

</div>

</body>
</html>
