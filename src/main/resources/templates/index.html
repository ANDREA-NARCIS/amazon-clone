<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Amazon Clone</title>

    <style>
        body { margin:0; font-family: Arial; background:#f3f3f3; }

        .navbar {
            background:#131921;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .nav-right {
            display:flex;
            align-items:center;
            gap:20px;
        }

        .navbar a {
            color:white;
            text-decoration:none;
        }

        .profile {
            position: relative;
        }

        .dropdown {
            display: none;
            position: absolute;
            background: white;
            color: black;
            right: 0;
            top: 40px;
            min-width: 150px;
            border-radius: 5px;
            overflow: hidden;
        }

        .dropdown a {
            display:block;
            padding:10px;
            color:black;
            text-decoration:none;
        }

        .dropdown a:hover {
            background:#eee;
        }

        .profile:hover .dropdown {
            display: block;
        }

        .grid {
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            padding:20px;
        }

        .card {
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        img {
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .price {
            color:#B12704;
            font-weight:bold;
        }

        button {
            background:#ffd814;
            border:none;
            padding:10px;
            width:100%;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover {
            background:#f7ca00;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div><b>Amazon Clone</b></div>

    <div class="nav-right">
        <a href="/cart">Cart</a>
        <a href="/product/add">Add Product</a>
        <a href="/orders">My Orders</a>

        <div class="profile">
            <span>Welcome, <span th:text="${#authentication.name}"></span></span>

            <div class="dropdown">
                <a href="/profile">Edit Profile</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>
</div>

<div class="grid">
    <div class="card" th:each="p : ${products}">
        <img th:src="${p.imageUrl}" />
        <h3 th:text="${p.name}"></h3>
        <p th:text="${p.description}"></p>
        <p class="price">₹<span th:text="${p.price}"></span></p>

        <a th:href="@{'/cart/add/' + ${p.id}}">
            <button>Add to Cart</button>
        </a>
    </div>
</div>

</body>
</html>
