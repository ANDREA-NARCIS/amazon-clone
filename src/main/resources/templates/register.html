<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background:#232f3e;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }
        form {
            background:white;
            color:black;
            padding:30px;
            border-radius:10px;
        }
        input {
            display:block;
            margin:10px 0;
            padding:10px;
            width:250px;
        }
        button {
            background:#febd69;
            border:none;
            padding:10px;
            width:100%;
        }
    </style>
</head>
<body>

<form method="post" th:action="@{/register}" th:object="${user}">
    <h2>Register</h2>

    <input th:field="*{username}" placeholder="Username" required />
    <input th:field="*{password}" type="password" placeholder="Password" required />

    <button type="submit">Register</button>

    <p>Already have an account? <a href="/login">Login</a></p>
</form>

</body>
</html>
