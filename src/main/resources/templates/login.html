<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background:#131921;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }
        form {
            background:white;
            color:black;
            padding:30px;
            border-radius:10px;
        }
        input {
            display:block;
            margin:10px 0;
            padding:10px;
            width:250px;
        }
        button {
            background:#febd69;
            border:none;
            padding:10px;
            width:100%;
        }
    </style>
</head>
<body>

<form method="post" action="/login">
    <h2>Login</h2>

    <input name="username" placeholder="Username" required />
    <input name="password" type="password" placeholder="Password" required />

    <button type="submit">Login</button>

    <p>Don't have an account? <a href="/register">Register</a></p>
</form>

</body>
</html>
